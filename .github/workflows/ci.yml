name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

jobs:

  test:
    name: Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest]
#          - ubuntu-latest
#          - windows-latest
#          - macos-latest

        python-version: ["3.11"]
#          - "3.11"
#          - "3.12"
#          - "3.13"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip

          pip install -e .

      - name: Run tests
        run: |
          python -m unittest discover src/tests/
  
  test_status:
    name: Test Status
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check matrix result
        run: echo "All matrix tests passed"

  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: |
          python -m build

      - name: Check package metadata
        run: |
          twine check dist/*